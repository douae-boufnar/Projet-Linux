services:

  backend:
    build: ./mon-projet-backend
    container_name: laravel_app
    working_dir: /var/www
    volumes:
      - ./mon-projet-backend:/var/www
    command: bash -c "chmod -R 777 storage bootstrap/cache && php-fpm"
    restart: always
    depends_on:
      - mysql
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: laravel_nginx
    restart: always
    ports:
      - "8000:80"
    volumes:
      - ./mon-projet-backend:/var/www
      - ./mon-projet-backend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - laravel

  frontend:
    build: ./frontend
    container_name: angular_app
    restart: always
    ports:
      - "4200:80"
    networks:
      - laravel

  mysql:
    build: ./mysql
    container_name: laravel_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: laravel_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data: