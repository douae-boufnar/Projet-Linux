<div class="auth-container">
  <div class="auth-card">
    <h2>Connexion</h2>
    <p class="subtitle">Accédez à votre compte</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" [(ngModel)]="credentials.email" required placeholder="votre@email.com">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" [(ngModel)]="credentials.password" required placeholder="••••••••">
      </div>

      <div *ngIf="error" class="error-message">
        {{ error }}
      </div>

      <button type="submit" [disabled]="!loginForm.form.valid || loading" class="btn-primary">
        {{ loading ? 'Chargement...' : 'Se connecter' }}
      </button>
    </form>

    <p class="footer-text">
      Pas encore de compte ? <a routerLink="/register">S'inscrire</a>
    </p>
  </div>
</div>
