<div class="details-container animate-fade-in">
  <div class="back-nav">
    <button class="btn-text" routerLink="/catalog">← Retour au catalogue</button>
  </div>

  <div *ngIf="livre" class="book-details-wrapper">
    <!-- Main Info Section -->
    <div class="main-info">
      <div class="cover-section">
        <img [src]="livre.image || 'https://images.unsplash.com/photo-1543005128-818273387013?auto=format&fit=crop&w=500&q=80'" [alt]="livre.titre" class="book-cover">
      </div>
      
      <div class="content-section">
        <span class="category-tag">{{ livre.category?.nom }}</span>
        <h1>{{ livre.titre }}</h1>
        <p class="author-name">Par <strong>{{ livre.auteur }}</strong></p>
        
        <div class="summary-box">
          <h3>Résumé</h3>
          <p class="description">{{ livre.description }}</p>
        </div>

        <div class="actions">
          <button (click)="onRead()" class="btn-read" [disabled]="isReading">
            <span *ngIf="!isReading">📖 Lire le livre complet</span>
            <span *ngIf="isReading">Chargement du PDF...</span>
          </button>
        </div>

        <div *ngIf="error" class="error-banner">
          {{ error }}
        </div>
      </div>
    </div>

    <!-- PDF Viewer Section -->
    <div *ngIf="isReading && pdfUrl" class="pdf-viewer-section animate-slide-up">
      <div class="viewer-header">
        <h2>Lecture en cours : {{ livre.titre }}</h2>
        <button class="btn-close" (click)="isReading = false">Fermer la lecture</button>
      </div>
      <div class="iframe-container">
        <iframe [src]="pdfUrl" width="100%" height="800px" frameborder="0"></iframe>
      </div>
    </div>
  </div>

  <div *ngIf="!livre" class="loading-state">
    <div class="spinner"></div>
    <p>Chargement des détails...</p>
  </div>
</div>
